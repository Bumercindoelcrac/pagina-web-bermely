# admin/config.yml
backend:
  name: git-gateway
  branch: main

# Configuración de medios (imágenes)
media_folder: "imagenes/productos"
public_folder: "/imagenes/productos"

# El menú se guardará en un solo archivo
collections:
  - name: "menu"
    label: "🍽️ Menú Digital"
    label_singular: "Platillo"
    description: "Administra todos los platillos del menú"
    folder: "data/menu"
    create: true
    slug: "{{id}}"
    identifier_field: "id"
    fields:
      - { label: "ID", name: "id", widget: "number", default: 1, required: true }
      - { label: "Nombre", name: "name", widget: "string", required: true }
      - { label: "Descripción", name: "description", widget: "text", required: true }
      - { 
          label: "Categoría", 
          name: "category", 
          widget: "select", 
          options: [
            "Desayunos", 
            "Menú Ejecutivo", 
            "Entradas", 
            "Carnes", 
            "Mariscos", 
            "Tacos y Otros", 
            "Molcajetes", 
            "Ensaladas", 
            "Caldos", 
            "Caldos de Gallina", 
            "Bebidas", 
            "Coctelería", 
            "Cafetería", 
            "Café", 
            "Crepas"
          ],
          required: true 
        }
      - { label: "Subcategoría", name: "subcategory", widget: "string", required: false }
      - { label: "Precio (MXN)", name: "price", widget: "number", valueType: "float", required: true }
      - { label: "Imagen", name: "image", widget: "string", required: false, default: "imagenes/productos/default.svg" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Rating", name: "rating", widget: "number", valueType: "float", default: 4.5 }
      - { label: "Pedidos", name: "orders", widget: "number", default: 0 }
      - { label: "Destacado", name: "featured", widget: "boolean", default: false }